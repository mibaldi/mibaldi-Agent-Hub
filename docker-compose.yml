services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mah}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      POSTGRES_DB: ${POSTGRES_DB:-mibaldi_agent_hub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mah}']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mah}:${POSTGRES_PASSWORD:-changeme_db_password}@postgres:5432/${POSTGRES_DB:-mibaldi_agent_hub}?schema=public
      API_PORT: 8080
      API_HOST: 0.0.0.0
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Define APP_ENCRYPTION_KEY en .env}
      NODE_ENV: production
    ports:
      # Tras Tailscale, cambia a "127.0.0.1:8080:8080" para no exponerlo en LAN.
      - '${API_PORT:-8080}:8080'
    volumes:
      # Claves SSH montadas como volumen de sólo lectura (opcional).
      - ./secrets:/app/secrets:ro
      # Para hosts tipo "docker" desde el contenedor (opcional, descomenta):
      # - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:

# Build the monorepo, typecheck it, build the Docker image and publish it to GHCR.
# The VPS never builds anything — it only pulls the versioned image this job pushes.
#
# Triggers:
#   - push to master        -> publishes the rolling `dev` + `master-<sha>` tags
#   - push tag v1.2.3       -> publishes `1.2.3`, `1.2`, `1`, `latest`
#   - manual (workflow_dispatch)
name: release

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # owner/repo -> ghcr.io/mibaldi/mibaldi-agent-hub (metadata-action lowercases it).
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---- 1. Quality gate: generate Prisma client + typecheck/build the whole monorepo ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run build:shared
      - run: npm run prisma:generate
      - run: npm run build:api # tsc on @mah/api
      - run: npm run build:web # tsc + vite build on @mah/web

  # ---- 2. Build the image and push every computed tag to GHCR ----
  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR with GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute tags + OCI labels from the git ref. This is the versioning engine.
      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On a v1.2.3 tag -> 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # On master -> a rolling `dev` and an immutable `master-<shortsha>`
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=master-,enable=${{ github.ref == 'refs/heads/master' }}
            # `latest` only moves on a real release tag, never on master
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64 # add linux/arm64 here if your VPS is ARM
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
